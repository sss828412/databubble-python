name: Publish to PyPI

# Inert until a GitHub release is published AND the account-level setup in
# RELEASING.md is complete (PyPI project created, Trusted Publisher
# configured for this repo + workflow + environment). Never runs on push.
# No token of any kind lives in this file or in repo secrets — publishing
# uses PyPI Trusted Publishing (OIDC), authenticated via the `id-token:
# write` permission below, not a stored credential.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "testpypi" to run a TestPyPI dry-run publish'
        required: true
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build backend
        run: python -m pip install --upgrade build

      - name: Build sdist and wheel
        run: python -m build

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-pypi:
    # Real release only — triggered by a published GitHub release.
    if: github.event_name == 'release'
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # required for Trusted Publishing — no token secret needed
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  publish-testpypi:
    # Manual dry-run only, and only when explicitly confirmed — never fires
    # from a release event or a plain workflow_dispatch without typing it.
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.confirm == 'testpypi'
    needs: build
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
